<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Workshop Notification</title>
    <style>
        body {
          margin: 0;
          padding: 0;
          background-color: #f4f4f4;
          font-family: Arial, sans-serif;
        }
        .container {
          max-width: 600px;
          margin: 40px auto;
          background-color: #ffffff;
          border-radius: 8px;
          overflow: hidden;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
          background-color: #1a1a1a;
          padding: 32px;
          text-align: center;
        }
        .header h1 {
          color: #ffffff;
          margin: 0;
          font-size: 24px;
          letter-spacing: 2px;
        }
        .header p {
          color: #aaaaaa;
          margin: 8px 0 0;
          font-size: 13px;
          letter-spacing: 1px;
        }
        .body {
          padding: 40px 32px;
        }
        .body h2 {
          color: #1a1a1a;
          font-size: 22px;
          margin-top: 0;
        }
        .details {
          background-color: #f9f9f9;
          border-left: 4px solid #1a1a1a;
          padding: 16px 20px;
          margin: 24px 0;
          border-radius: 4px;
        }
        .details p {
          margin: 6px 0;
          color: #333333;
          font-size: 14px;
        }
        .details span {
          font-weight: bold;
          color: #1a1a1a;
        }
        .description {
          color: #555555;
          font-size: 14px;
          line-height: 1.7;
        }
        .footer {
          background-color: #1a1a1a;
          padding: 20px 32px;
          text-align: center;
        }
        .footer p {
          color: #aaaaaa;
          font-size: 12px;
          margin: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Coffee & Code</h1>
        <p>@student.wethinkcode.co.za</p>
    </div>
    <div class="body">
        <h2>Mojalefa</h2>
        <div class="details">
            <p><span>Date:</span> 26 grjg 565t</p>
            <p><span>Time:</span> 12:00</p>
            <p><span>Summary:</span> Heres a summary</p>
        </div>
        <p class="description">heres a description of the project</p>
    </div>
    <div class="footer">
        <p>You are receiving this because you signed up for Coffee & Code workshops.</p>
    </div>
</div>
</body>
</html>
